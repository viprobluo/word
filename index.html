<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>写字台</title>
    <style>
        body,
        html {
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #333;
            color: white;
            font-family: 'DeDaoJinKai', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #editor-container {
            margin-top: 8%;
            position: relative;
            /* 相对定位，以便绝对定位resize手柄 */
            height: 100%;
            box-sizing: border-box;

        }

        #editor {
            width: 70%;
            /* 初始宽度，可根据需要调整 */
            min-width: 42ch;
            /* 确保至少可以显示19个汉字 */
            max-width: 100%;
            /* 最大宽度不超过容器宽度 */
            height: 80%;
            /* 高度可以根据需要调整 */
            margin: 0 auto;
            /* 水平居中 */
            margin-top: 10px;
            padding: 20px;
            border: 1px solid white;
            background-color: #333;
            color: white;
            text-align: justify;
            /* 设置文字左右对齐 */
            text-justify: inter-ideograph;
            /* 针对汉字的对齐优化 */
            box-sizing: border-box;
            resize: none;
            /* 允许用户调整大小 */
            overflow-y: scroll;
            /* 允许垂直滚动 */
            /* font-family: 'DeDaoJinKai', sans-serif; */
            font-family: 'DeDaoJinKai';
            /* font-family: '霞鹜文楷', 'DeDaoJinKai'; */
            font-size: 22px;
            outline: none;
            line-height: 1.5em;
        }

        /* Webkit内核浏览器的滚动条自定义样式 */
        #editor::-webkit-scrollbar {
            width: 8px;
            /* 滚动条宽度 */
        }

        #editor::-webkit-scrollbar-track {
            background-color: #333;
            /* 滚动条轨道颜色 */
        }

        #editor::-webkit-scrollbar-thumb {
            background-color: #333;
            /* 滚动条滑块颜色 */
            border-radius: 10px;
            /* 滚动条滑块圆角 */
        }

        .resizer {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            background: transparent;
            cursor: se-resize;
            /* 设置鼠标光标形状 */
        }

        .button-container {
            position: fixed;
            /* 固定定位到屏幕 */
            top: 10px;
            /* 距离屏幕顶部的距离 */
            width: 80%;
            /* 按钮容器宽度为100% */
            text-align: center;
            /* 水平居中对齐所有子元素 */
            z-index: 10;
            /* 确保按钮容器在编辑器上方 */
            padding: 10px 0;
            /* 根据需要调整内边距 */

        }

        .button-container button {
            display: inline-block;
            /* 使按钮内联显示，允许水平居中 */
            margin: 5px;
            /* 按钮之间的间距，以及与屏幕边缘的间距 */
            padding: 8px 15px;
            cursor: pointer;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .button-container button:hover {
            background-color: #555;
        }

        /* #title { */
        /* margin-top: 30px; */
        /* 初始宽度，可根据需要调整 */
        /* width: 70%; */
        /* 确保至少可以显示19个汉字 */
        /* min-width: 24ch; */
        /* 最大宽度不超过容器宽度 */
        /* max-width: 34ch; */
        /* resize: none; */
        /* line-height: 1.5em; */
        /* font-family: 'HarmonyOS Sans SC', sans-serif; */
        /* font-size: 24px; */
        /* }  */


        #read {
            font-family: 'HarmonyOS Sans SC', sans-serif;
            font-size: 12px;
            color: rgba(250, 235, 215, 0.406);
            /* margin-left: 180px; */
            /* 水平居中 */
            position: relative;
            margin-top: 20px;

            /* 相对定位，以便绝对定位resize手柄 */

        }

        /* 窄屏样式（屏幕宽度≤768px时）：padding-top为50px */
        @media (max-width: 1081px) {
            #read {
                margin-top: 40px;
                /* 窄屏时顶部内边距50px */
            }}
    </style>
</head>

<body>
    <div id="editor-container">

        <!-- <h2 id="title" >标题</h2> -->
        <div id="read">全文 0 字 预计 0 分钟</div>
        <textarea id="editor" autofocus></textarea>
        <div class="resizer"></div>
    </div>
    <div class="button-container">
        <button id="beautify">排版</button>
        <button id="scrollTopButton">置顶</button>
        <button id="numBigButton">字体滤镜</button>
        <button id="cleanMarkdown">|</button>
        <button id="copyButton">复制</button>
        <!-- <button id="reformatButton">标题</button> -->
        <!-- <button id="toggleButton">β佥</button> -->
        <!-- <button id="flowerButton">花边</button> -->
        <button id="clearButton">清空</button>
        <button id="cbzButton">错别字</button>
        <!-- <button id="quan">禅</button>  -->
    </div>
    <script>
        // JavaScript代码将放在这里
    </script>
</body>
</html>
<script src="js.js"></script>
